<!DOCTYPE html>
<html>
<head>
  <title>Contact | Canvas by Govind</title>
  <meta name="description" content="Original sculptures, acrylic and oil paintings by Govind. Handmade fine art available for collectors.">
  <meta name="keywords" content="original paintings India, sculptures, fine art Govind">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="header"></div>

  <section class="contact-section">
	<div class="contact-container">
	  <!-- LEFT IMAGE -->
	  <div class="contact-image">
		<img src="images/sample1.jpeg" alt="Artwork">
	  </div>

	  <!-- RIGHT FORM -->
	  <div class="contact-form">
		<h2>Collector Inquiry</h2>
		<p>Interested in acquiring an artwork? Send your inquiry.</p>
		<form>
		  <input type="text" placeholder="Your Name" required>
		  <input type="email" placeholder="Your Email" required>
		  <input type="text" placeholder="Artwork Name / ID">
		  <textarea placeholder="Your Message"></textarea>
		  <button type="submit">Send Inquiry</button>
		</form>
	  </div>
	</div>
  </section>

  <section class="contact">
	<h2>Order Original Artwork</h2>
	<p>To purchase any artwork, please contact via WhatsApp.</p>
	<a class="btn" href="https://wa.me/917827662454">Order on WhatsApp</a>
	<p>Email: artistgovind.krish@gmail.com</p>
	<p>Instagram: @canvasbyGovind</p>
  </section>

  <div id="footer"></div>
  <script src="script.js"></script>
</body>
</html>
