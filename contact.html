<!DOCTYPE html>
<html>
<head>
  <title>Contact | Canvas by Govind</title>
  <meta name="description" content="Original sculptures, acrylic and oil paintings by Govind. Handmade fine art available for collectors.">
  <meta name="keywords" content="original paintings India, sculptures, fine art Govind">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="header"></div>

  <section class="contact-section">
	<div class="contact-container">
	  <!-- LEFT IMAGE -->
	  <div class="contact-image">
		<img src="images/sample1.jpeg" alt="Artwork">
	  </div>

	  <!-- RIGHT FORM -->
	  <div class="contact-form">
		<h2>Collector Inquiry</h2>
		<p>Interested in acquiring an artwork? Send your inquiry.</p>
		<form action="https://formsubmit.co/your-email@gmail.com" method="POST">
		  <input type="text" name="name" placeholder="Your Name" required>
		  <input type="email" name="email" placeholder="Your Email" required>
		  <input type="text" name="artwork" placeholder="Artwork Name / ID">
		  <textarea name="message" placeholder="Your Message"></textarea>
		  <!-- Hidden settings -->
		  <input type="hidden" name="_subject" value="New Art Inquiry!">
		  <input type="hidden" name="_captcha" value="false">
		  <input type="hidden" name="_template" value="table">
		  <button type="submit">Send Inquiry</button>
		  <input type="hidden" name="_next" value="https://artistgovindkrish-del.github.io/canvasbygovind/thankyou.html">
		</form>
		<a href="https://wa.me/917827662454?text=Hello, I am interested in your artwork" target="_blank" class="whatsapp-btn">Chat on WhatsApp</a>
	  </div>
	</div>
  </section>

  <section class="contact">
	<h2>Order Original Artwork</h2>
	<p>To purchase any artwork, please contact via WhatsApp.</p>
	<a class="btn" href="https://wa.me/917827662454">Order on WhatsApp</a>
	<p>Email: artistgovind.krish@gmail.com</p>
	<p>Instagram: @canvasbyGovind</p>
  </section>

  <div id="footer"></div>
  <script src="script.js"></script>
</body>
</html>
